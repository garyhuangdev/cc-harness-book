<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Terminal window -->
  <rect x="8" y="16" width="88" height="72" rx="8" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="8" y="16" width="88" height="16" rx="8" fill="#2d2d44"/>
  <rect x="8" y="24" width="88" height="8" fill="#2d2d44"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="24" r="3" fill="#ff5f57"/>
  <circle cx="30" cy="24" r="3" fill="#febc2e"/>
  <circle cx="40" cy="24" r="3" fill="#28c840"/>
  <!-- Cursor prompt -->
  <text x="18" y="50" font-family="monospace" font-size="14" fill="#d4a574">$</text>
  <rect x="30" y="40" width="8" height="14" fill="#d4a574" opacity="0.8"/>
  <!-- Code lines -->
  <rect x="18" y="58" width="40" height="3" rx="1" fill="#7c8db5" opacity="0.6"/>
  <rect x="18" y="66" width="56" height="3" rx="1" fill="#7c8db5" opacity="0.4"/>
  <rect x="18" y="74" width="32" height="3" rx="1" fill="#7c8db5" opacity="0.3"/>
  <!-- Book -->
  <g transform="translate(60, 48)">
    <!-- Book spine -->
    <path d="M0,8 Q4,4 8,0 L56,0 Q60,4 60,8 L60,64 Q56,60 52,60 L8,60 Q4,60 0,56 Z" fill="#d4a574"/>
    <!-- Book front cover -->
    <path d="M8,0 L56,0 Q60,4 60,8 L60,64 Q56,60 52,60 L4,60 Q8,56 8,52 Z" fill="#e8c9a0"/>
    <!-- Book pages -->
    <path d="M6,58 L6,6 Q8,4 10,2 L10,58 Q8,58 6,58" fill="#f5f0eb"/>
    <!-- Book lines -->
    <rect x="16" y="14" width="30" height="2" rx="1" fill="#b8956a" opacity="0.5"/>
    <rect x="16" y="22" width="24" height="2" rx="1" fill="#b8956a" opacity="0.5"/>
    <rect x="16" y="30" width="28" height="2" rx="1" fill="#b8956a" opacity="0.5"/>
    <!-- AI symbol on book -->
    <text x="28" y="50" font-family="sans-serif" font-weight="bold" font-size="14" fill="#1a1a2e" text-anchor="middle">AI</text>
  </g>
</svg>
